name: Test Anno

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  anno-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools" wheel packaging
          python -m pip install -e ".[dev]"

      - name: Run anno unit tests
        run: pytest tests/anno/test_anno_utils.py -v --tb=short

  anno-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools" wheel packaging
          python -m pip install -e ".[dev]"

      - name: Run anno integration tests
        run: pytest tests/anno/test_anno_cli.py -v --tb=short
